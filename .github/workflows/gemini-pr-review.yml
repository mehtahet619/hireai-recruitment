name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  gemini-review:
    name: AI Code Review (Gemini)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install google-generativeai
        run: pip install google-generativeai requests

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Run Gemini review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          python - <<'EOF'
          import os, json, textwrap
          import google.generativeai as genai
          import urllib.request

          api_key = os.environ["GEMINI_API_KEY"]
          genai.configure(api_key=api_key)

          with open("pr_diff.txt") as f:
              diff = f.read()

          # Truncate diff to avoid token limits (keep first 60k chars)
          if len(diff) > 60000:
              diff = diff[:60000] + "\n\n... [diff truncated for review] ..."

          prompt = textwrap.dedent(f"""
          You are an expert code reviewer for the HireAI Engineering Lifecycle Platform.
          Review this pull request and provide structured feedback.

          PR Title: {os.environ['PR_TITLE']}
          Author: {os.environ['PR_AUTHOR']}

          Diff:
          ```diff
          {diff}
          ```

          Provide a review covering:
          1. **Summary** — what this PR does in 2-3 sentences
          2. **Issues** — bugs, security concerns, or correctness problems (if any)
          3. **Suggestions** — code quality, performance, or pattern improvements
          4. **Tests** — are the changes adequately tested?
          5. **Verdict** — one of: ✅ APPROVE, ⚠️ APPROVE WITH SUGGESTIONS, ❌ REQUEST CHANGES

          Be concise and constructive. Format as markdown.
          """).strip()

          model = genai.GenerativeModel("gemini-1.5-flash")
          response = model.generate_content(prompt)
          review_body = response.text

          # Post comment to PR via GitHub API
          comment = {
              "body": f"## 🤖 Gemini AI Review\n\n{review_body}\n\n---\n*Automated review by Gemini 1.5 Flash*"
          }
          url = f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR_NUMBER']}/comments"
          req = urllib.request.Request(
              url,
              data=json.dumps(comment).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
              },
              method="POST"
          )
          with urllib.request.urlopen(req) as res:
              print(f"Comment posted: {res.status}")
          EOF
