name: AI PR Review (OpenRouter)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  ai-review:
    name: AI Code Review (OpenRouter)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Run AI review via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          python - <<'EOF'
          import os, json, textwrap, urllib.request

          with open("pr_diff.txt") as f:
              diff = f.read()

          if len(diff) > 60000:
              diff = diff[:60000] + "\n\n... [diff truncated for review] ..."

          prompt = textwrap.dedent(f"""
          You are an expert code reviewer for the HireAI Engineering Lifecycle Platform.
          Review this pull request and provide structured feedback.

          PR Title: {os.environ['PR_TITLE']}
          Author: {os.environ['PR_AUTHOR']}

          Diff:
          ```diff
          {diff}
          ```

          Provide a review covering:
          1. **Summary** — what this PR does in 2-3 sentences
          2. **Issues** — bugs, security concerns, or correctness problems (if any)
          3. **Suggestions** — code quality, performance, or pattern improvements
          4. **Tests** — are the changes adequately tested?
          5. **Verdict** — one of: ✅ APPROVE, ⚠️ APPROVE WITH SUGGESTIONS, ❌ REQUEST CHANGES

          Be concise and constructive. Format as markdown.
          """).strip()

          # Call OpenRouter (OpenAI-compatible API)
          payload = json.dumps({
              "model": "google/gemini-2.0-flash-exp:free",
              "messages": [{"role": "user", "content": prompt}],
          }).encode()

          req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=payload,
              headers={
                  "Authorization": f"Bearer {os.environ['OPENROUTER_API_KEY']}",
                  "Content-Type": "application/json",
                  "HTTP-Referer": f"https://github.com/{os.environ['REPO']}",
                  "X-Title": "HireAI PR Review",
              },
              method="POST",
          )
          with urllib.request.urlopen(req) as res:
              result = json.loads(res.read())

          review_body = result["choices"][0]["message"]["content"]

          # Post comment to PR
          comment = {
              "body": f"## 🤖 AI Code Review\n\n{review_body}\n\n---\n*Automated review via OpenRouter — google/gemini-2.0-flash-exp*"
          }
          gh_req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR_NUMBER']}/comments",
              data=json.dumps(comment).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          with urllib.request.urlopen(gh_req) as res:
              print(f"Comment posted: {res.status}")
          EOF
