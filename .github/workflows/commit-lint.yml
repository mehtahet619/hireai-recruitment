name: Commit Message Lint

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  lint-commits:
    name: Check commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main for merge-base calculation
        run: git fetch origin main --no-tags

      - name: Validate commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            MERGE_BASE=$(git merge-base origin/main ${{ github.event.pull_request.head.sha }})
            # --no-merges skips auto-generated merge commits (Merge pull request #N, Merge branch ...)
            COMMITS=$(git log ${MERGE_BASE}..${{ github.event.pull_request.head.sha }} --no-merges --format="%H")
          else
            BASE=${{ github.event.before }}
            HEAD=${{ github.sha }}

            if [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
              MERGE_BASE=$(git merge-base origin/main ${HEAD} 2>/dev/null || echo "")
              if [ -n "$MERGE_BASE" ]; then
                COMMITS=$(git log ${MERGE_BASE}..${HEAD} --no-merges --format="%H")
              else
                COMMITS=$(git log -1 --no-merges --format="%H")
              fi
            else
              COMMITS=$(git log ${BASE}..${HEAD} --no-merges --format="%H")
            fi
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits to lint."
            exit 0
          fi

          FAILED=0
          for COMMIT in $COMMITS; do
            MSG=$(git log -1 --format="%s" $COMMIT)
            echo "Checking: $MSG"
            COMMIT_FAILED=0

            if ! echo "$MSG" | grep -qE '^\[(FIX|IMP|ADD)\]'; then
              echo "  ❌ Must start with [FIX], [IMP], or [ADD]"
              COMMIT_FAILED=1
            fi

            if ! echo "$MSG" | grep -qE '^\[(FIX|IMP|ADD)\] \S+'; then
              echo "  ❌ Must include a module name e.g. [ADD] employer_auth: ..."
              COMMIT_FAILED=1
            fi

            LENGTH=${#MSG}
            if [ $LENGTH -gt 80 ]; then
              echo "  ❌ Title is ${LENGTH} chars — max is 80"
              COMMIT_FAILED=1
            fi

            if [ $COMMIT_FAILED -eq 0 ]; then
              echo "  ✅ OK"
            else
              FAILED=1
            fi
          done

          exit $FAILED
