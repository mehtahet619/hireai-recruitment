# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect this repo on https://dashboard.render.com/blueprints
# Then set these secret env vars in the Render dashboard:
#   MISTRAL_API_KEY or GEMINI_API_KEY
#   JWT_SECRET (any long random string)
#   REDIS_URL (Upstash free tier)
#   S3_* (Cloudflare R2 — optional, falls back to local storage)

services:
  # ── Backend API ──────────────────────────────────────────────────────────
  - type: web
    name: ai-recruiter-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # LLM provider — set to "mistral" or "gemini"
      - key: LLM_PROVIDER
        value: "mistral"
      - key: MISTRAL_MODEL
        value: mistral-large-latest
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: LLM_TIMEOUT
        value: "120"
      - key: USE_MOCK_LLM
        value: ""
      # Secrets — set these in the Render dashboard
      - key: MISTRAL_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_PUBLIC_BASE
        sync: false
      # Auto-wired from frontend service URL
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: ai-recruiter-web
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend (static) ────────────────────────────────────────────────────
  - type: web
    name: ai-recruiter-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Points the frontend directly at the backend URL
      - key: VITE_API_BASE
        fromService:
          type: web
          name: ai-recruiter-api
          envVarKey: RENDER_EXTERNAL_URL
