name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────
  backend:
    name: Backend — install & import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Check all imports resolve
        run: python -c "from app.main import app; print('✅ Backend imports OK')"
        working-directory: backend
        env:
          USE_MOCK_LLM: "true"

      - name: Run tests (if any)
        run: python -m pytest tests/ -v --tb=short || true
        working-directory: backend
        env:
          USE_MOCK_LLM: "true"

  # ── Frontend ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE: https://ai-recruiter-api-zji3.onrender.com
