name: Commit Message Lint

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  lint-commits:
    name: Check commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Only check commits that are new compared to the base branch (main)
            # Using merge-base ensures we only lint the actual PR commits,
            # not the entire branch history back to where it diverged.
            MERGE_BASE=$(git merge-base origin/${{ github.base_ref }} ${{ github.event.pull_request.head.sha }})
            COMMITS=$(git log ${MERGE_BASE}..${{ github.event.pull_request.head.sha }} --format="%H")
          else
            BASE=${{ github.event.before }}
            HEAD=${{ github.sha }}

            if [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
              # New branch or force-push: only check commits not yet in main
              MERGE_BASE=$(git merge-base origin/main ${HEAD} 2>/dev/null || echo "")
              if [ -n "$MERGE_BASE" ]; then
                COMMITS=$(git log ${MERGE_BASE}..${HEAD} --format="%H")
              else
                COMMITS=$(git log -1 --format="%H")
              fi
            else
              # Normal push: only the new commits in this push
              COMMITS=$(git log ${BASE}..${HEAD} --format="%H")
            fi
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits to lint."
            exit 0
          fi

          FAILED=0
          for COMMIT in $COMMITS; do
            MSG=$(git log -1 --format="%s" $COMMIT)
            echo "Checking: $MSG"
            COMMIT_FAILED=0

            # Rule 1: must start with [FIX], [IMP], or [ADD]
            if ! echo "$MSG" | grep -qE '^\[(FIX|IMP|ADD)\]'; then
              echo "  ❌ Must start with [FIX], [IMP], or [ADD]"
              COMMIT_FAILED=1
            fi

            # Rule 2: must have a module name after the tag — [TAG] module: ...
            if ! echo "$MSG" | grep -qE '^\[(FIX|IMP|ADD)\] \S+'; then
              echo "  ❌ Must include a module name e.g. [ADD] employer_auth: ..."
              COMMIT_FAILED=1
            fi

            # Rule 3: title must be 80 chars or fewer
            LENGTH=${#MSG}
            if [ $LENGTH -gt 80 ]; then
              echo "  ❌ Title is ${LENGTH} chars — max is 80"
              COMMIT_FAILED=1
            fi

            if [ $COMMIT_FAILED -eq 0 ]; then
              echo "  ✅ OK"
            else
              FAILED=1
            fi
          done

          exit $FAILED
