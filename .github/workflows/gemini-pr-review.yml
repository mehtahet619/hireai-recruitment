name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Run AI review (Qwen → HuggingFace fallback)
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          python - <<'PYEOF'
          import os, json, urllib.request, urllib.error

          with open("pr_diff.txt") as f:
              diff = f.read()

          if len(diff) > 60000:
              diff = diff[:60000] + "\n\n... [diff truncated for review] ..."

          prompt = f"""You are an expert code reviewer for the HireAI Engineering Lifecycle Platform.
Review this pull request and provide structured feedback.

PR Title: {os.environ['PR_TITLE']}
Author: {os.environ['PR_AUTHOR']}

Diff:
```diff
{diff}
```

Provide a review covering:
1. **Summary** - what this PR does in 2-3 sentences
2. **Issues** - bugs, security concerns, or correctness problems (if any)
3. **Suggestions** - code quality, performance, or pattern improvements
4. **Tests** - are the changes adequately tested?
5. **Verdict** - one of: APPROVE, APPROVE WITH SUGGESTIONS, or REQUEST CHANGES

Be concise and constructive. Format as markdown."""

          review_body = None
          provider_used = None

          # --- Primary: Qwen (via DashScope OpenAI-compatible API) ---
          qwen_key = os.environ.get("QWEN_API_KEY", "")
          if qwen_key:
              try:
                  payload = json.dumps({
                      "model": "qwen-plus",
                      "messages": [{"role": "user", "content": prompt}],
                  }).encode()
                  req = urllib.request.Request(
                      "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions",
                      data=payload,
                      headers={
                          "Authorization": "Bearer " + qwen_key,
                          "Content-Type": "application/json",
                      },
                      method="POST",
                  )
                  with urllib.request.urlopen(req, timeout=60) as res:
                      result = json.loads(res.read())
                  review_body = result["choices"][0]["message"]["content"]
                  provider_used = "Qwen (qwen-plus)"
                  print("Qwen review succeeded.")
              except Exception as e:
                  print(f"Qwen failed: {e} — trying HuggingFace fallback...")

          # --- Fallback: HuggingFace Inference API ---
          if review_body is None:
              hf_key = os.environ.get("HF_API_KEY", "")
              if not hf_key:
                  raise RuntimeError("Both QWEN_API_KEY and HF_API_KEY are missing or failed.")
              try:
                  # Using Qwen2.5-72B-Instruct hosted on HuggingFace
                  hf_model = "Qwen/Qwen2.5-72B-Instruct"
                  payload = json.dumps({
                      "model": hf_model,
                      "messages": [{"role": "user", "content": prompt}],
                      "max_tokens": 1024,
                  }).encode()
                  req = urllib.request.Request(
                      "https://router.huggingface.co/v1/chat/completions",
                      data=payload,
                      headers={
                          "Authorization": "Bearer " + hf_key,
                          "Content-Type": "application/json",
                      },
                      method="POST",
                  )
                  with urllib.request.urlopen(req, timeout=120) as res:
                      result = json.loads(res.read())
                  review_body = result["choices"][0]["message"]["content"]
                  provider_used = f"HuggingFace ({hf_model})"
                  print("HuggingFace fallback succeeded.")
              except Exception as e:
                  raise RuntimeError(f"HuggingFace fallback also failed: {e}")

          # --- Post comment to PR ---
          comment = {
              "body": (
                  "## AI Code Review\n\n"
                  + review_body
                  + f"\n\n---\n*Automated review via {provider_used}*"
              )
          }
          gh_req = urllib.request.Request(
              "https://api.github.com/repos/" + os.environ["REPO"]
              + "/issues/" + os.environ["PR_NUMBER"] + "/comments",
              data=json.dumps(comment).encode(),
              headers={
                  "Authorization": "Bearer " + os.environ["GH_TOKEN"],
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          with urllib.request.urlopen(gh_req) as res:
              print("Comment posted:", res.status)
          PYEOF
